name: Bug report
description: Report a reproducible problem in Pui.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Pui. Please include enough detail for someone else to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the behavior you observed.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps or commands that trigger the issue.
      placeholder: |
        1. Open Pui
        2. Select a workspace folder
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pui version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: false
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.4
    validations:
      required: false
  - type: input
    id: node
    attributes:
      label: Node.js and npm versions
      placeholder: Node.js 22.x, npm 10.x
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots. Remove secrets and tokens.
      render: shell
    validations:
      required: false
