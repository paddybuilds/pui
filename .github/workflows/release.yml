name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            package-script: package:win
          - platform: macos
            runner: macos-latest
            package-script: package:mac

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Package
        run: npm run ${{ matrix.package-script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUI_COMMIT_SHA: ${{ github.sha }}

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
